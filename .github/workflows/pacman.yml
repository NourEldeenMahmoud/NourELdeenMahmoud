name: Update Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'output/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Create output directory
        run: mkdir -p output

      - name: Generate Pac-Man (light, smaller cells, single color)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/generate_pacman.py \
            --user ${{ github.repository_owner }} \
            --output output/pacman-contribution-graph.svg \
            --cell-size 8 \
            --cell-gap 1 \
            --single-color

      - name: Generate Pac-Man (dark, smaller cells, single color)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/generate_pacman.py \
            --user ${{ github.repository_owner }} \
            --output output/pacman-contribution-graph-dark.svg \
            --theme dark \
            --cell-size 8 \
            --cell-gap 1 \
            --single-color

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          if git diff --staged --quiet; then
            touch output/.last_update
            git add output/.last_update
            git commit -m "Update Pac-Man graph (small cells, single color) - $TIMESTAMP [skip ci]" || true
          else
            git commit -m "Update Pac-Man graph (small cells, single color) - $TIMESTAMP [skip ci]"
          fi
          git push
